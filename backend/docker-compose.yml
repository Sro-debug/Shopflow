version: '3.9'

services:
  # ─── MongoDB ────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ecom_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ecom_distributed
    networks:
      - ecom_network

  # ─── Cache Node 1 ───────────────────────────────────────────────
  cache_node_1:
    build: .
    container_name: ecom_cache_1
    restart: unless-stopped
    command: node node/cacheNode.js
    environment:
      CACHE_NODE_PORT: 50052
      CACHE_CAPACITY: 1000
    ports:
      - "50052:50052"
    networks:
      - ecom_network

  # ─── Cache Node 2 ───────────────────────────────────────────────
  cache_node_2:
    build: .
    container_name: ecom_cache_2
    restart: unless-stopped
    command: node node/cacheNode.js
    environment:
      CACHE_NODE_PORT: 50053
      CACHE_CAPACITY: 1000
    ports:
      - "50053:50053"
    networks:
      - ecom_network

  # ─── Cache Node 3 ───────────────────────────────────────────────
  cache_node_3:
    build: .
    container_name: ecom_cache_3
    restart: unless-stopped
    command: node node/cacheNode.js
    environment:
      CACHE_NODE_PORT: 50054
      CACHE_CAPACITY: 1000
    ports:
      - "50054:50054"
    networks:
      - ecom_network

  # ─── API Gateway ────────────────────────────────────────────────
  gateway:
    build: .
    container_name: ecom_gateway
    restart: unless-stopped
    command: node gateway/gateway.js
    environment:
      GATEWAY_PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/ecom_distributed
      CACHE_NODES: cache_node_1:50052,cache_node_2:50053,cache_node_3:50054
      JWT_SECRET: ${JWT_SECRET:-supersecret_jwt_key}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - cache_node_1
      - cache_node_2
      - cache_node_3
    networks:
      - ecom_network

  # ─── Proxy Server ───────────────────────────────────────────────
  proxy:
    build: .
    container_name: ecom_proxy
    restart: unless-stopped
    command: node proxy/server.js
    environment:
      PROXY_PORT: 4000
      GATEWAY_URL: http://gateway:5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      - gateway
    networks:
      - ecom_network

volumes:
  mongodb_data:

networks:
  ecom_network:
    driver: bridge
